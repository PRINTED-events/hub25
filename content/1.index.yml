title: The Ultimate Conference Template
description: A completely free, modern, and feature-rich conference and meetup template. Enjoy a free Git-based CMS with visual editing and live previews directly in your browser - perfect for non-technical organizers. Powered with Nuxt 4, Vue 3, Nuxt Studio, Nuxt UI, Tailwind CSS v4, and more cutting-edge tech.
seo:
  title: The Ultimate Conference Template
  description: A completely free, modern, and feature-rich conference and meetup template. Enjoy a free Git-based CMS with visual editing and live previews directly in your browser - perfect for non-technical organizers. Powered with Nuxt 4, Vue 3, Nuxt Studio, Nuxt UI, Tailwind CSS v4, and more cutting-edge tech.
blocks:
  - component: AppLandingHeroSplit
    title: The Ultimate Conference Template
    description: A completely free, modern, and feature-rich conference and meetup template. Enjoy a free Git-based CMS with visual editing and live previews directly in your browser - perfect for non-technical organizers.
    headline: quick-conf
    videoUrl: https://youtu.be/uh-Rys6nTKI
    links:
      - label: Get the Template
        icon: i-lucide-github
        trailing: false
        size: xl
        to: https://github.com/toddeTV/quick-conf
        target: _blank
      - label: Explore Demo Content
        icon: i-lucide-telescope
        trailing: false
        color: neutral
        variant: subtle
        size: xl
        to: /schedule
    features:
      - title: 100% Customizable
        description: Change colors, fonts, logo, icons, and layout easily via the configuration file.
        icon: i-lucide-palette
      - title: SEO Optimized
        description: Built-in SEO best practices including sitemap, OpenGraph, and schema.org data.
        icon: i-lucide-search
      - title: Modern Tech Stack
        description: Powered by Nuxt 4, Vue 3, Tailwind CSS 4 & TypeScript.
        icon: i-simple-icons-nuxtdotjs
      - title: CMS with Visual Editing
        description: Powered by Nuxt Content & Nuxt Studio. Edit content visually with a live preview directly in your browser.
        icon: i-lucide-pen-tool

  - component: AppLandingSeparator

  - component: AppLandingMetaInfo
    class: md:-my-[70px] relative z-10
    items:
      - icon: i-lucide-calendar
        text: April 1st, 2042
        label: Date
      - icon: i-lucide-map-pin
        text: Amsterdam, NL
        label: Location
      - icon: i-lucide-users
        text: 10k+ Watchers
        label: Capacity
      - icon: i-lucide-mic-2
        text: 30+ Speakers
        label: Speakers

  - component: AppLandingSeparator

  - component: AppLandingSpeakers
    title: Our Esteemed Speakers
    description: These are fictional speakers generated to demonstrate the layout.
    headline: Featured Drying Experts

  - component: AppLandingHeroMedia
    title: Experience the Vibe
    description: This component showcases how you can display event atmosphere.
    headline: Atmosphere
    overlayOpacity: 0.4
    image:
      src: https://images.unsplash.com/photo-1540575467063-178a50c2df87?w=1200&auto=format
      alt: Conference crowd
    links:
      - label: Watch Highlights
        icon: i-lucide-play
        variant: solid
        size: lg
        to: '#'

  - component: AppLandingHeroCountdown
    title: Countdown to Dryness
    description: The most anticipated non-event of the century.
    headline: Save the Date
    targetDate: '2042-04-01T10:00:00Z'
    links:
      - label: Add to Calendar
        icon: i-lucide-calendar-plus
        variant: outline
        size: lg
        to: '#'

  - component: AppLandingMarquee
    direction: left
    speed: 40
    gap: 30
    images:
      - src: https://images.unsplash.com/photo-1587825140708-dfaf72ae4b04?w=700&auto=format
        alt: Conference Hall
      - src: https://images.unsplash.com/photo-1529070538774-1843cb3265df?w=700&auto=format
        alt: Audience listening to a presentation
      - src: https://images.unsplash.com/photo-1540575467063-178a50c2df87?w=1200&auto=format
        alt: Conference crowd in a large hall
      - src: https://images.unsplash.com/photo-1515187029135-18ee286d815b?w=600&auto=format
        alt: Large conference hall venue
      - src: https://images.unsplash.com/photo-1591115765373-5207764f72e7?w=600&auto=format
        alt: Attendees networking at the event

  - component: AppLandingFeatures
    title: Everything You Need
    description: From speaker management to schedules, we have got you covered.
    headline: Template Features
    items:
      - title: Speaker Profiles
        description: Dedicated pages for speakers with bios, social links, and related talks.
        icon: i-lucide-mic
      - title: Schedule Grid
        description: A responsive, multi-track schedule view that handles complex agendas.
        icon: i-lucide-calendar-clock
      - title: Blog / News
        description: Keep your attendees updated with a built-in blog section.
        icon: i-lucide-newspaper
      - title: FAQ Section
        description: Answer common questions with an accordion-style FAQ component.
        icon: i-lucide-help-circle
      - title: Sponsor Showcase
        description: Highlight your partners with categorized sponsor tiers.
        icon: i-lucide-heart-handshake
      - title: Ticket Pricing
        description: Clear pricing tables to drive ticket sales.
        icon: i-lucide-tag

  - component: AppLandingTestimonials
    title: Loved by Developers
    description: See what other fictional and non-existing people could say about the Quick Conf template.
    headline: Testimonials
    items:
      - quote: Finally a conference template that doesn't look like it was built in 2010.
        user:
          name: Jessica Design
          description: UX Lead
          to: https://github.com/toddeTV/quick-conf
          target: _blank
          avatar:
            src: https://i.pravatar.cc/120?img=9
            alt: Avatar of Jessica
      - quote: This template saved me weeks of work. I had my meetup site up and running in an hour!
        user:
          name: Sarah Dev
          description: Meetup Organizer
          to: https://github.com/toddeTV/quick-conf
          target: _blank
          avatar:
            src: https://i.pravatar.cc/120?img=5
            alt: Avatar of Sarah
      - quote: The Nuxt Studio integration is a game changer. My content team loves the visual editor.
        user:
          name: Mike Manager
          description: DevRel at TechCo
          to: https://github.com/toddeTV/quick-conf
          target: _blank
          avatar:
            src: https://i.pravatar.cc/120?img=8
            alt: Avatar of Mike

  - component: AppLandingCta
    title: Start Building Today
    description: Clone the repository and launch your conference website in minutes.
    links:
      - label: Get the Template
        variant: solid
        to: https://github.com/toddeTV/quick-conf
        icon: i-lucide-github
        trailing: false
        size: xl
        target: _blank
      - label: Read Documentation
        variant: subtle
        to: https://github.com/toddeTV/quick-conf/tree/main/docs
        icon: i-lucide-book
        trailing: false
        size: xl
        target: _blank

  - component: AppLandingFaqPreview
    title: Frequently Asked Questions
    description: Common questions about using this template.
    headline: FAQ
    link:
      label: View All FAQs
      to: /faq
      variant: outline
    items:
      - label: Is this template free?
        content: Yes, Quick Conf is 100% open source and free to use for personal and commercial projects.
      - label: Do I need to know Vue/Nuxt?
        content: To customize the code, yes. But to manage content, you can use Nuxt Studio without coding knowledge.
      - label: Can I change the colors?
        content: Absolutely! The colors are defined in the configuration file and use Tailwind's color palette.
