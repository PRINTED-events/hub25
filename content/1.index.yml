title: PRINTED Hub 2025
description: September 2025 – Rüdesheim am Rhein. Two days of workshops, talks and community for the 3D printing scene in Europe.
seo:
  title: PRINTED Hub 2025
  description: Recap of PRINTED Hub 2025 – September 2025 in Rüdesheim am Rhein. Talks, workshops, speakers and highlights.
blocks:
